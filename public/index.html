<!DOCTYPE html>
<html lang="vi" data-theme="dark">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>W-API 9Router Chat</title>
  <link rel="stylesheet" href="/css/themes.css?v=20260514-user-auth" />
  <link rel="stylesheet" href="/css/main.css?v=20260515-mobile" />
  <link rel="stylesheet" href="/css/chat.css?v=20260515-mobile" />
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/highlight.js@11.9.0/styles/github-dark-dimmed.min.css" />
</head>
<body>

<aside id="sidebar">
  <div class="sidebar-header">
    <div class="sidebar-logo">
      <svg width="22" height="22" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
        <defs>
          <linearGradient id="logoGrad" x1="0%" y1="0%" x2="100%" y2="100%">
            <stop offset="0%" stop-color="#4285F4"/>
            <stop offset="50%" stop-color="#9B59B6"/>
            <stop offset="100%" stop-color="#F4A61A"/>
          </linearGradient>
        </defs>
        <path d="M12 2 L13.5 10.5 L22 12 L13.5 13.5 L12 22 L10.5 13.5 L2 12 L10.5 10.5 Z" fill="url(#logoGrad)"/>
      </svg>
      W-API
    </div>
    <button id="new-chat-icon-btn" title="Cuộc hội thoại mới">
      <svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><path d="M12 20h9"/><path d="M16.5 3.5a2.121 2.121 0 0 1 3 3L7 19l-4 1 1-4L16.5 3.5z"/></svg>
    </button>
  </div>

  <div id="conv-list"></div>

  <div class="sidebar-footer">
    <button class="sidebar-footer-btn" id="settings-btn">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><circle cx="12" cy="12" r="3"/><path d="M19.07 4.93A9.95 9.95 0 0 1 22 12a9.95 9.95 0 0 1-2.93 7.07M4.93 19.07A9.95 9.95 0 0 1 2 12a9.95 9.95 0 0 1 2.93-7.07M15.54 8.46a5 5 0 0 1 0 7.07M8.46 15.54a5 5 0 0 1 0-7.07"/></svg>
      Cài đặt
    </button>
    <a class="sidebar-footer-btn hidden" href="/admin2732000" aria-hidden="true" tabindex="-1">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/></svg>
      Quản trị
    </a>
  </div>
</aside>

<button id="sidebar-backdrop" type="button" aria-label="Close sidebar"></button>

<main id="main">
  <header id="topbar">
    <button id="sidebar-toggle" title="Mở/đóng sidebar">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="18" x2="21" y2="18"/></svg>
    </button>
    <div class="topbar-model">
      <select id="model-select" title="Chọn model 9Router">
        <option value="auto">Auto</option>
        <option value="ag/gemini-3-flash">gemini-3-flash(ưu tiên)</option>
        <option value="ag/gemini-3.1-pro-low">gemini-3.1-pro-low</option>
        <option value="ag/gemini-3.1-pro-high">gemini-3.1-pro-high</option>
        <option value="ag/claude-sonnet-4-6">claude-sonnet-4-6</option>
        <option value="ag/gpt-oss-120b-medium">gpt-oss-120b-medium</option>
      </select>
    </div>
    <div class="topbar-right" style="width:40px"></div>
  </header>

  <section id="chat-view">
    <div id="messages"></div>

    <div id="input-area">
      <div class="input-container">
        <div id="attachment-preview"></div>
        <div class="input-box">
          <textarea id="msg-input" placeholder="Hỏi bất cứ điều gì" rows="1"></textarea>
          <div class="input-actions">
            <div class="input-actions-left">
              <button id="img-btn" class="attach-btn" title="Đính kèm ảnh">
                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><rect x="3" y="3" width="18" height="18" rx="2"/><circle cx="8.5" cy="8.5" r="1.5"/><polyline points="21,15 16,10 5,21"/></svg>
              </button>
              <button id="file-btn" class="attach-btn" title="Đính kèm file ảnh, TXT, MD, JSON, CSV, LOG">
                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><path d="M21.44 11.05l-9.19 9.19a6 6 0 0 1-8.49-8.49l9.19-9.19a4 4 0 0 1 5.66 5.66l-9.2 9.19a2 2 0 0 1-2.83-2.83l8.49-8.48"/></svg>
              </button>
              <button id="jp-vi-btn" class="mode-btn" type="button" aria-pressed="false" title="Bật prompt dịch thuật Nhật - Việt cho ảnh/file đính kèm">
                JP&rarr;VI
              </button>
            </div>
            <button id="send-btn" title="Gửi (Enter)" disabled>
              <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><line x1="12" y1="19" x2="12" y2="5"/><polyline points="5,12 12,5 19,12"/></svg>
            </button>
          </div>
        </div>
        <div class="input-footer">W-API có thể mắc lỗi. Enter gửi. Shift+Enter xuống dòng.</div>
      </div>
    </div>
  </section>
</main>

<div id="auth-gate-modal" class="modal-overlay auth-gate">
  <form id="auth-gate-form" class="modal auth-gate-card">
    <div class="modal-header">
      <h3>Nhập App key</h3>
    </div>
    <div class="modal-body">
      <div class="setting-group">
        <label for="auth-gate-key-input">App key</label>
        <input id="auth-gate-key-input" type="password" autocomplete="off" placeholder="Nhập key trong config.json" />
        <p class="auth-gate-message" id="auth-gate-message">Bạn cần nhập App key hợp lệ để sử dụng chat.</p>
      </div>
    </div>
    <div class="modal-footer">
      <button id="auth-gate-submit-btn" class="btn-primary" type="submit">Tiếp tục</button>
    </div>
  </form>
</div>

<div id="settings-modal" class="modal-overlay hidden">
  <div class="modal">
    <div class="modal-header">
      <h3>Cài đặt</h3>
      <button id="close-settings-btn" class="icon-btn">
        <svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
      </button>
    </div>
    <div class="modal-body">
      <div class="setting-group">
        <label>Giao diện</label>
        <div class="theme-toggle">
          <button class="theme-btn" id="theme-dark-btn">Tối</button>
          <button class="theme-btn" id="theme-light-btn">Sáng</button>
        </div>
      </div>
      <div class="setting-group hidden">
        <label for="app-key-input">App key</label>
        <div style="display:flex;gap:8px">
          <input id="app-key-input" type="password" autocomplete="off" placeholder="Nhập key trong config.json" style="flex:1;padding:9px 10px">
          <button id="save-app-key-btn" class="btn-primary" type="button">Lưu</button>
        </div>
        <p style="font-size:13px;color:var(--text-muted);line-height:1.5">
          Đây là key nội bộ trong <code style="background:var(--bg-secondary);padding:2px 6px;border-radius:4px;font-size:12px">config.json</code>, không phải API key 9Router. API key 9Router chỉ nằm ở backend.
        </p>
      </div>
      <div class="setting-group">
        <label>Xóa lịch sử</label>
        <button id="clear-history-btn" class="btn-danger">Xóa toàn bộ cuộc hội thoại</button>
      </div>
    </div>
    <div class="modal-footer">
      <button id="close-settings-ok-btn" class="btn-primary">Đóng</button>
    </div>
  </div>
</div>

<div id="toast-container"></div>

<input type="file" id="image-input" accept=".png,.jpg,.jpeg,.webp,image/png,image/jpeg,image/webp" hidden />
<input type="file" id="file-input" accept=".png,.jpg,.jpeg,.webp,.txt,.md,.json,.csv,.log,image/png,image/jpeg,image/webp,text/plain,text/markdown,application/json,text/csv" hidden />

<script src="https://cdn.jsdelivr.net/npm/marked@12.0.0/marked.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/highlight.js@11.9.0/lib/core.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/highlight.js@11.9.0/lib/languages/javascript.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/highlight.js@11.9.0/lib/languages/java.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/highlight.js@11.9.0/lib/languages/cpp.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/highlight.js@11.9.0/lib/languages/css.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/highlight.js@11.9.0/lib/languages/xml.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/highlight.js@11.9.0/lib/languages/bash.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/highlight.js@11.9.0/lib/languages/sql.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/highlight.js@11.9.0/lib/languages/json.min.js"></script>
<script src="/js/state.js?v=20260514-node-only"></script>
<script src="/js/api.js?v=20260514-node-only"></script>
<script src="/js/markdown.js?v=20260514-node-only"></script>
<script src="/js/settings.js?v=20260514-node-only"></script>
<script src="/js/sidebar.js?v=20260515-mobile"></script>
<script src="/js/fileHandler.js?v=20260514-node-only"></script>
<script src="/js/chat.js?v=20260514-node-only"></script>
<script src="/js/app.js?v=20260514-node-only"></script>
</body>
</html>
